<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Math Genius – 3 Levels Edition</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#6ec6ff;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
  }

  #game-container {
    width:960px;
    height:540px;
    position:relative;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
  }

  canvas {
    width:100%;
    height:100%;
    display:block;
    background:linear-gradient(#6ec6ff 60%, #5bb85b 60%);
  }

  #hud {
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    color:white;
    font-weight:bold;
    text-shadow:0 2px 4px rgba(0,0,0,0.6);
    pointer-events:none;
  }

  #lives span {
    display:inline-block;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
    margin-right:4px;
    box-shadow:0 0 6px rgba(0,0,0,0.6);
  }

  #ammo {
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-shadow:0 2px 4px black;
  }

  .screen {
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
  }

  .panel {
    background:rgba(0,0,0,0.8);
    padding:20px 30px;
    border-radius:12px;
    min-width:300px;
    text-align:center;
  }

  button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
  }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="hud">
    <div id="lives"></div>
    <div id="info"></div>
    <div id="level-name"></div>
  </div>

  <div id="ammo">Ammo: 7/7</div>

  <div id="start-screen" class="screen">
    <div class="panel">
      <h1>Math Genius</h1>

      <label>Matematik emne</label>
      <select id="topic">
        <option value="add">Addition</option>
        <option value="sub">Subtraktion</option>
        <option value="mul">Multiplikation</option>
        <option value="div">Division</option>
      </select>

      <label>Årgang</label>
      <select id="grade">
        <option value="1">1. klasse</option>
        <option value="2">2. klasse</option>
        <option value="3">3. klasse</option>
        <option value="4">4. klasse</option>
        <option value="5">5. klasse</option>
        <option value="6">6. klasse</option>
      </select>

      <button id="btn-start">Start spil</button>
    </div>
  </div>

  <div id="math-dialog" class="screen" style="display:none;">
    <div class="panel">
      <h2>Matematik</h2>
      <div id="question"></div>
      <input type="number" id="answer">
      <button id="btn-answer">Svar</button>
      <div id="feedback"></div>
    </div>
  </div>

  <div id="game-over" class="screen" style="display:none;">
    <div class="panel">
      <h1>Game Over</h1>
      <button id="btn-restart">Prøv igen</button>
    </div>
  </div>

  <div id="level-complete" class="screen" style="display:none;">
    <div class="panel">
      <h1>Level gennemført!</h1>
      <button id="btn-next">Næste level</button>
    </div>
  </div>

</div>

<script>
window.onload = () => {

  /* === CANVAS === */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  /* === DOM === */
  const startScreen = document.getElementById("start-screen");
  const mathDialog = document.getElementById("math-dialog");
  const gameOverScreen = document.getElementById("game-over");
  const levelCompleteScreen = document.getElementById("level-complete");

  const btnStart = document.getElementById("btn-start");
  const btnAnswer = document.getElementById("btn-answer");
  const btnRestart = document.getElementById("btn-restart");
  const btnNext = document.getElementById("btn-next");

  const topicSelect = document.getElementById("topic");
  const gradeSelect = document.getElementById("grade");

  const livesEl = document.getElementById("lives");
  const infoEl = document.getElementById("info");
  const levelNameEl = document.getElementById("level-name");
  const ammoEl = document.getElementById("ammo");

  const questionEl = document.getElementById("question");
  const answerEl = document.getElementById("answer");
  const feedbackEl = document.getElementById("feedback");

  /* === GAME STATE === */
  let keys = {};
  let gameRunning = false;
  let currentTopic = "add";
  let currentGrade = 1;
  let currentLevel = 0;
  let lives = 3;

  let player;
  let platforms = [];
  let enemies = [];
  let spikes = [];
  let portals = [];
  let bullets = [];
  let enemyBullets = [];
  let fallingObjects = [];

  let currentQuestion = null;
  let pendingPortal = null;

  /* === AMMO SYSTEM === */
  let ammo = 7;
  let maxAmmo = 7;
  let canShoot = true;
  let shootCooldown = 500;
  let reloadTime = 1200;

  /* === LEVELS === */
  const LEVELS = [
    /* === LEVEL 1 === */
    {
      name:"Level 1",
      platforms:[
        {x:0,y:480,w:960,h:60},
        {x:150,y:380,w:180,h:20},
        {x:380,y:320,w:180,h:20},
        {x:620,y:260,w:180,h:20}
      ],
      enemies:[
        {x:260,y:450,w:32,h:32,type:"normal"},
      ],
      spikes:[
        {x:520,y:460,w:40,h:20}
      ],
      portals:[
        {x:650,y:220,w:40,h:40,solved:false}
      ]
    },

    /* === LEVEL 2 === */
    {
      name:"Level 2",
      platforms:[
        {x:0,y:480,w:260,h:60},
        {x:320,y:480,w:200,h:60},
        {x:580,y:480,w:380,h:60},
        {x:120,y:380,w:120,h:20},
        {x:340,y:340,w:120,h:20},
        {x:520,y:300,w:120,h:20},
        {x:720,y:260,w:120,h:20}
      ],
      enemies:[
        {x:180,y:450,w:32,h:32,type:"normal"},
        {x:360,y:450,w:32,h:32,type:"normal"},
        {x:640,y:450,w:32,h:32,type:"normal"}
      ],
      spikes:[
        {x:260,y:460,w:60,h:20},
        {x:520,y:460,w:60,h:20},
        {x:420,y:460,w:40,h:20}
      ],
      portals:[
        {x:760,y:220,w:40,h:40,solved:false}
      ]
    },

    /* === LEVEL 3 — SKYDEFJENDER + FALLING OBJECTS === */
    {
      name:"Level 3 – Boss Zone",
      platforms:[
        {x:0,y:480,w:960,h:60},
        {x:200,y:380,w:160,h:20},
        {x:450,y:320,w:160,h:20},
        {x:700,y:260,w:160,h:20}
      ],
      enemies:[
        {x:300,y:350,w:32,h:32,type:"shooter"},
        {x:500,y:290,w:32,h:32,type:"shooter"},
        {x:750,y:230,w:32,h:32,type:"shooter"}
      ],
      spikes:[
        {x:260,y:460,w:60,h:20},
        {x:520,y:460,w:60,h:20},
        {x:420,y:460,w:40,h:20}
      ],
      portals:[
        {x:880,y:220,w:40,h:40,solved:false}
      ],
      falling:true
    }
  ];

  /* === PLAYER === */
  function createPlayer() {
    return {
      x:40,
      y:420,
      w:26,
      h:40,
      vx:0,
      vy:0,
      onGround:false,
      facing:1
    };
  }

  /* === INPUT === */
  window.addEventListener("keydown", e => keys[e.key] = true);
  window.addEventListener("keyup", e => keys[e.key] = false);

  /* === MATH === */
  function generateQuestion(topic, grade) {
    const max = grade * 10;
    let a = Math.floor(Math.random()*max);
    let b = Math.floor(Math.random()*max);
    let text, answer;

    if(topic==="add"){ text=`${a} + ${b}`; answer=a+b; }
    if(topic==="sub"){ text=`${a} - ${b}`; answer=a-b; }
    if(topic==="mul"){ text=`${a} × ${b}`; answer=a*b; }
    if(topic==="div"){
      b = b || 1;
      a = b * Math.floor(Math.random()*10);
      text=`${a} ÷ ${b}`;
      answer=a/b;
    }

    return {text, answer};
  }

  function openMathDialog(portal){
    pendingPortal = portal;
    currentQuestion = generateQuestion(currentTopic, currentGrade);
    questionEl.textContent = currentQuestion.text;
    answerEl.value = "";
    feedbackEl.textContent = "";
    mathDialog.style.display = "flex";
    gameRunning = false;
  }

  btnAnswer.onclick = () => {
    const val = parseInt(answerEl.value);
    if(val === currentQuestion.answer){
      pendingPortal.solved = true;
      mathDialog.style.display = "none";
      gameRunning = true;
    } else {
      lives--;
      if(lives<=0) showGameOver();
      mathDialog.style.display = "none";
      gameRunning = true;
    }
    updateHUD();
  };

  /* === COLLISION === */
  function overlap(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
  }

  /* === LOAD LEVEL === */
  function loadLevel(i){
    const L = LEVELS[i];
    currentLevel = i;
    platforms = L.platforms.map(p=>({...p}));
    enemies = L.enemies.map(e=>({...e}));
    spikes = L.spikes.map(s=>({...s}));
    portals = L.portals.map(p=>({...p}));
    bullets = [];
    enemyBullets = [];
    fallingObjects = [];
    ammo = maxAmmo;
    canShoot = true;
    player = createPlayer();
    updateHUD();

    /* Falling objects */
    if(L.falling){
      setInterval(() => {
        fallingObjects.push({
          x: Math.random()*900,
          y: -20,
          w:20,
          h:20,
          vy:4
        });
      }, 1200);
    }

    /* Shooter enemies */
    enemies.forEach(e => {
      if(e.type === "shooter"){
        setInterval(() => {
          enemyBullets.push({
            x: e.x,
            y: e.y,
            r:6,
            speed:4,
            dir: player.x > e.x ? 1 : -1
          });
        }, 1500);
      }
    });
  }

  /* === HUD === */
  function updateHUD(){
    livesEl.innerHTML = "";
    for(let i=0;i<lives;i++) livesEl.innerHTML += "<span></span>";
    infoEl.textContent = `${currentTopic} · ${currentGrade}. kl`;
    levelNameEl.textContent = LEVELS[currentLevel].name;
    ammoEl.textContent = `Ammo: ${ammo}/${maxAmmo}`;
  }

  /* === GAME OVER === */
  function showGameOver(){
    gameRunning = false;
    gameOverScreen.style.display = "flex";
  }

  btnRestart.onclick = () => {
    lives = 3;
    currentLevel = 0;
    startScreen.style.display = "flex";
    gameOverScreen.style.display = "none";
  };

  /* === NEXT LEVEL === */
  btnNext.onclick = () => {
    levelCompleteScreen.style.display = "none";
    currentLevel++;
    if(currentLevel >= LEVELS.length) currentLevel = 0;
    loadLevel(currentLevel);
    gameRunning = true;
  };

  /* === RELOAD === */
  function reloadWeapon(){
    canShoot = false;
    ammoEl.textContent = "Reloading...";
    setTimeout(() => {
      ammo = maxAmmo;
      canShoot = true;
      updateHUD();
    }, reloadTime);
  }

  /* === SHOOT === */
  function shootBullet(){
    if (!canShoot) return;
    if (ammo <= 0) {
      reloadWeapon();
      return;
    }

    bullets.push({
      x: player.facing === 1 ? player.x + player.w : player.x,
      y: player.y + player.h/2,
      r: 6,
      speed: 10,
      dir: player.facing
    });

    ammo--;
    updateHUD();

    canShoot = false;
    setTimeout(() => canShoot = true, shootCooldown);

    if (ammo === 0) reloadWeapon();
  }

  /* === UPDATE === */
  function update(){
    if(!gameRunning) return;

    player.vx = 0;

    if(keys["ArrowLeft"]){
      player.vx = -4;
      player.facing = -1;
    }
    if(keys["ArrowRight"]){
      player.vx = 4;
      player.facing = 1;
    }

    if(keys["ArrowUp"] && player.onGround){
      player.vy = -12;
      player.onGround = false;
    }

    if(keys[" "]){
      shootBullet();
      keys[" "] = false;
    }

    player.vy += 0.6;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;

    for(const p of platforms){
      if(overlap(player,p)){
        if(player.vy>0){
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }

    for(const b of bullets){
      b.x += b.speed * b.dir;
    }

    bullets = bullets.filter(b => b.x < 1000 && b.x > -100);

    for(const b of bullets){
      for(const e of enemies){
        if(overlap(
          {x:b.x-b.r,y:b.y-b.r,w:b.r*2,h:b.r*2},
          e
        )){
          e.dead = true;
          b.dead = true;
        }
      }
    }

    enemies = enemies.filter(e => !e.dead);
    bullets = bullets.filter(b => !b.dead);

    for(const eb of enemyBullets){
      eb.x += eb.speed * eb.dir;
      if(overlap(
        {x:eb.x-eb.r,y:eb.y-eb.r,w:eb.r*2,h:eb.r*2},
        player
      )){
        lives--;
        eb.dead = true;
      }
    }

    enemyBullets = enemyBullets.filter(b => !b.dead);

    for(const obj of fallingObjects){
      obj.y += obj.vy;
      if(overlap(player,obj)){
        lives--;
        obj.dead = true;
      }
    }

    fallingObjects = fallingObjects.filter(o => !o
