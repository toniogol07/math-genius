<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Neon Arena Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #050816 0%, #02030a 60%, #000000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    #uiLayer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #startScreen {
      pointer-events: auto;
      background: rgba(10, 10, 30, 0.9);
      border-radius: 20px;
      padding: 24px 32px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      border: 2px solid rgba(0, 255, 255, 0.6);
      text-align: center;
      min-width: 320px;
    }

    #startScreen h1 {
      margin: 0 0 10px;
      font-size: 32px;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(0, 255, 255, 0.7);
    }

    #startScreen p {
      margin: 4px 0 16px;
      font-size: 14px;
      color: #a8b3ff;
    }

    #startScreen label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      color: #8fd5ff;
    }

    #gradeSelect {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 255, 0.5);
      background: rgba(5, 10, 30, 0.9);
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    #startBtn {
      margin-top: 16px;
      width: 100%;
      padding: 10px 0;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #00f5ff, #00ff88);
      color: #000;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    }

    #startBtn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    #hudTop {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      font-size: 14px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #hudTop span {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.4);
    }

    #hudBottomRight {
      position: absolute;
      right: 16px;
      bottom: 12px;
      font-size: 14px;
      text-align: right;
      pointer-events: none;
    }

    #hudBottomRight .box {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 255, 0.4);
      margin-top: 4px;
      min-width: 120px;
    }

    #hudBottomRight strong {
      color: #00f5ff;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="uiLayer">
    <div id="startScreen">
      <h1>NEON ARENA</h1>
      <p>Top‑down 2D skydespil – sværhedsgrad følger klassetrin.</p>

      <label for="gradeSelect">Vælg klassetrin (1.–9. klasse)</label>
      <select id="gradeSelect">
        <option value="1">1. klasse (meget let)</option>
        <option value="2">2. klasse</option>
        <option value="3">3. klasse</option>
        <option value="4">4. klasse</option>
        <option value="5" selected>5. klasse (normal)</option>
        <option value="6">6. klasse</option>
        <option value="7">7. klasse</option>
        <option value="8">8. klasse</option>
        <option value="9">9. klasse (meget svær)</option>
      </select>

      <button id="startBtn">Start spil</button>
    </div>
  </div>

  <div id="hudTop" style="display:none;">
    <span id="hudGrade">Klasse: -</span>
    <span id="hudWave">Bølge: 1</span>
    <span id="hudScore">Score: 0</span>
    <span id="hudHP">HP: 100</span>
  </div>

  <div id="hudBottomRight" style="display:none;">
    <div class="box" id="hudAmmo"><strong>Ammo:</strong> 12 / 12</div>
    <div class="box" id="hudInfo"><strong>Tip:</strong> WASD til at bevæge, mus til at sigte, klik for at skyde.</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const startScreen = document.getElementById("startScreen");
    const uiLayer = document.getElementById("uiLayer");
    const gradeSelect = document.getElementById("gradeSelect");
    const startBtn = document.getElementById("startBtn");

    const hudTop = document.getElementById("hudTop");
    const hudGrade = document.getElementById("hudGrade");
    const hudWave = document.getElementById("hudWave");
    const hudScore = document.getElementById("hudScore");
    const hudHP = document.getElementById("hudHP");
    const hudBottomRight = document.getElementById("hudBottomRight");
    const hudAmmo = document.getElementById("hudAmmo");
    const hudInfo = document.getElementById("hudInfo");

    const keys = { w:false, a:false, s:false, d:false };
    window.addEventListener("keydown", e => {
      if (e.code === "KeyW") keys.w = true;
      if (e.code === "KeyA") keys.a = true;
      if (e.code === "KeyS") keys.s = true;
      if (e.code === "KeyD") keys.d = true;
    });
    window.addEventListener("keyup", e => {
      if (e.code === "KeyW") keys.w = false;
      if (e.code === "KeyA") keys.a = false;
      if (e.code === "KeyS") keys.s = false;
      if (e.code === "KeyD") keys.d = false;
    });

    const mouse = { x: 0, y: 0 };
    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    let running = false;
    let lastTime = 0;

    const player = {
      x: 0,
      y: 0,
      r: 16,
      speed: 260,
      hp: 100,
      maxHp: 100
    };

    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];

    let score = 0;
    let wave = 1;
    let grade = 5;

    let fireCooldown = 0;
    let ammo = 12;
    let maxAmmo = 12;
    let canShoot = true;
    let reloading = false;

    function updateAmmoHUD() {
      if (reloading) {
        hudAmmo.innerHTML = "<strong>Ammo:</strong> Reloading...";
      } else {
        hudAmmo.innerHTML = "<strong>Ammo:</strong> " + ammo + " / " + maxAmmo;
      }
    }

    function reloadWeapon() {
      if (reloading) return;
      reloading = true;
      canShoot = false;
      updateAmmoHUD();
      setTimeout(() => {
        ammo = maxAmmo;
        reloading = false;
        canShoot = true;
        updateAmmoHUD();
      }, 1000);
    }

    window.addEventListener("mousedown", e => {
      if (!running) return;
      tryShoot();
    });

    function tryShoot() {
      if (!canShoot || reloading) return;
      if (ammo <= 0) {
        reloadWeapon();
        return;
      }

      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      const speed = 520;

      bullets.push({
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 4,
        life: 0,
        maxLife: 1.2
      });

      ammo--;
      updateAmmoHUD();
      canShoot = false;
      fireCooldown = 0.12;
    }

    function spawnEnemy() {
      const margin = 60;
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) {
        x = Math.random() * canvas.width;
        y = -margin;
      } else if (side === 1) {
        x = canvas.width + margin;
        y = Math.random() * canvas.height;
      } else if (side === 2) {
        x = Math.random() * canvas.width;
        y = canvas.height + margin;
      } else {
        x = -margin;
        y = Math.random() * canvas.height;
      }

      const baseSpeed = 60 + grade * 10;
      const hp = 10 + grade * 2;
      const shootChance = 0.001 + grade * 0.0004;

      enemies.push({
        x, y,
        r: 14,
        speed: baseSpeed,
        hp,
        maxHp: hp,
        shootChance
      });
    }

    function spawnExplosion(x, y, color) {
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 120;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0,
          maxLife: 0.6 + Math.random() * 0.4,
          color
        });
      }
    }

    function resetGame() {
      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      player.hp = player.maxHp;

      bullets = [];
      enemies = [];
      enemyBullets = [];
      particles = [];

      score = 0;
      wave = 1;

      ammo = maxAmmo;
      reloading = false;
      canShoot = true;
      updateAmmoHUD();

      hudScore.textContent = "Score: " + score;
      hudWave.textContent = "Bølge: " + wave;
      hudHP.textContent = "HP: " + player.hp;
    }

    function difficultySpawnRate() {
      const base = 1.4;
      const min = 0.35;
      const factor = (grade - 1) / 8;
      return base - factor * (base - min);
    }

    function difficultyEnemyCount() {
      return 4 + Math.floor(grade * 1.2) + wave;
    }

    function difficultyEnemyShootMultiplier() {
      return 1 + (grade - 1) * 0.25;
    }

    let spawnTimer = 0;
    let targetEnemies = 0;

    function startWave() {
      targetEnemies = difficultyEnemyCount();
      spawnTimer = 0;
    }

    function update(dt) {
      if (!running) return;

      const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
      const moveY = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
      const len = Math.hypot(moveX, moveY) || 1;
      const nx = moveX / len;
      const ny = moveY / len;

      player.x += nx * player.speed * dt;
      player.y += ny * player.speed * dt;

      const margin = 30;
      player.x = Math.max(margin, Math.min(canvas.width - margin, player.x));
      player.y = Math.max(margin, Math.min(canvas.height - margin, player.y));

      if (!canShoot) {
        fireCooldown -= dt;
        if (fireCooldown <= 0) {
          canShoot = true;
        }
      }

      spawnTimer += dt;
      const spawnRate = difficultySpawnRate();
      if (spawnTimer > spawnRate && enemies.length < targetEnemies) {
        spawnTimer = 0;
        spawnEnemy();
      }

      bullets.forEach(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life += dt;
      });
      bullets = bullets.filter(b => b.life < b.maxLife);

      enemies.forEach(e => {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
        const ex = dx / dist;
        const ey = dy / dist;

        e.x += ex * e.speed * dt;
        e.y += ey * e.speed * dt;

        const shootRoll = Math.random() * difficultyEnemyShootMultiplier();
        if (shootRoll < e.shootChance * dt * 60) {
          const speed = 260 + grade * 10;
          enemyBullets.push({
            x: e.x,
            y: e.y,
            vx: ex * speed,
            vy: ey * speed,
            r: 4,
            life: 0,
            maxLife: 2
          });
        }
      });

      enemyBullets.forEach(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life += dt;
      });
      enemyBullets = enemyBullets.filter(b => b.life < b.maxLife);

      particles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life += dt;
      });
      particles = particles.filter(p => p.life < p.maxLife);

      bullets.forEach(b => {
        enemies.forEach(e => {
          const dx = e.x - b.x;
          const dy = e.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < e.r + b.r) {
            b.life = b.maxLife;
            e.hp -= 10 + grade;
            if (e.hp <= 0) {
              spawnExplosion(e.x, e.y, "rgba(0,255,255,");
              e.dead = true;
              score += 10 + grade * 2;
              hudScore.textContent = "Score: " + score;
            }
          }
        });
      });
      enemies = enemies.filter(e => !e.dead);

      enemyBullets.forEach(b => {
        const dx = player.x - b.x;
        const dy = player.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < player.r + b.r) {
          b.life = b.maxLife;
          player.hp -= 8 + grade * 2;
          hudHP.textContent = "HP: " + Math.max(0, Math.floor(player.hp));
          spawnExplosion(player.x, player.y, "rgba(255,0,120,");
          if (player.hp <= 0) {
            gameOver();
          }
        }
      });

      if (enemies.length === 0 && targetEnemies > 0) {
        wave++;
        hudWave.textContent = "Bølge: " + wave;
        startWave();
      }
    }

    function drawNeonBackground() {
      const w = canvas.width;
      const h = canvas.height;

      const grad = ctx.createRadialGradient(
        w / 2, h / 2, 0,
        w / 2, h / 2, Math.max(w, h)
      );
      grad.addColorStop(0, "#050816");
      grad.addColorStop(0.5, "#02030a");
      grad.addColorStop(1, "#000000");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = "#0ff";
      ctx.lineWidth = 1;
      const gridSize = 80;
      for (let x = 0; x < w; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPlayer() {
      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(angle);

      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 20;

      ctx.fillStyle = "#00f5ff";
      ctx.beginPath();
      ctx.arc(0, 0, player.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#00ffbb";
      ctx.beginPath();
      ctx.arc(player.r * 0.6, 0, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawEnemies() {
      enemies.forEach(e => {
        const t = performance.now() * 0.004;
        const pulse = 0.6 + 0.4 * Math.sin(t + e.x * 0.01);

        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.shadowColor = "#ff00ff";
        ctx.shadowBlur = 18;

        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, e.r);
        grad.addColorStop(0, "rgba(255,0,255,1)");
        grad.addColorStop(1, "rgba(255,0,255,0.1)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, e.r * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(-e.r, -e.r - 10, e.r * 2, 4);
        ctx.fillStyle = "#00ff88";
        const ratio = e.hp / e.maxHp;
        ctx.fillRect(-e.r, -e.r - 10, e.r * 2 * ratio, 4);

        ctx.restore();
      });
    }

    function drawBullets() {
      ctx.save();
      ctx.shadowBlur = 15;

      ctx.shadowColor = "#ffff00";
      ctx.fillStyle = "#ffff66";
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.shadowColor = "#ff0066";
      ctx.fillStyle = "#ff3366";
      enemyBullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function drawParticles() {
      particles.forEach(p => {
        const alpha = 1 - p.life / p.maxLife;
        ctx.fillStyle = p.color + alpha + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 + 4 * alpha, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function draw(dt) {
      drawNeonBackground();
      drawParticles();
      drawEnemies();
      drawBullets();
      drawPlayer();
    }

    function gameOver() {
      running = false;
      uiLayer.style.display = "flex";
      startScreen.style.display = "block";
      hudTop.style.display = "none";
      hudBottomRight.style.display = "none";
      hudInfo.innerHTML = "<strong>Tip:</strong> Prøv et lavere klassetrin, hvis det er for svært.";
    }

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      if (running) {
        update(dt);
        draw(dt);
      }

      requestAnimationFrame(loop);
    }

    startBtn.addEventListener("click", () => {
      grade = parseInt(gradeSelect.value, 10);
      hudGrade.textContent = "Klasse: " + grade + ".";
      hudWave.textContent = "Bølge: 1";
      hudScore.textContent = "Score: 0";
      hudHP.textContent = "HP: 100";

      uiLayer.style.display = "none";
      startScreen.style.display = "none";
      hudTop.style.display = "flex";
      hudBottomRight.style.display = "block";

      resetGame();
      startWave();
      running = true;
      lastTime = performance.now();
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
