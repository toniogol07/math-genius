<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Math Genius – Platformer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(#4ec0ff, #87e0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 960px;
      height: 540px;
      background: linear-gradient(#6bd16b 40%, #3b2b1a 40%);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      font-size: 14px;
      pointer-events: none;
    }

    #hud .lives span {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 4px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fffc, #f33);
      box-shadow: 0 0 6px rgba(0,0,0,0.6);
    }

    #hud .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
    }

    #start-screen, #math-dialog, #game-over-screen, #level-complete-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, rgba(255,255,255,0.25), rgba(0,0,0,0.75));
      color: #fff;
    }

    .panel {
      background: rgba(0,0,0,0.75);
      padding: 24px 32px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
      min-width: 320px;
    }

    .panel h1, .panel h2 {
      margin-bottom: 12px;
      text-align: center;
    }

    .panel label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    .panel select, .panel input[type="number"] {
      width: 100%;
      margin-top: 4px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #222;
      color: #fff;
    }

    .btn-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #ffb347, #ff6b6b);
      color: #222;
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
      transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.6);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.7);
      filter: brightness(0.95);
    }

    #math-dialog .question {
      margin-top: 10px;
      font-size: 16px;
      text-align: center;
    }

    #math-dialog input[type="number"] {
      margin-top: 10px;
    }

    #math-dialog .feedback {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="960" height="540"></canvas>

    <div id="hud">
      <div class="lives" id="lives"></div>
      <div class="badge" id="hud-info"></div>
      <div class="badge" id="hud-level"></div>
    </div>

    <div id="start-screen">
      <div class="panel">
        <h1>Math Genius</h1>

        <label for="topic">Matematisk emne</label>
        <select id="topic">
          <option value="add">Addition</option>
          <option value="sub">Subtraktion</option>
          <option value="mul">Multiplikation</option>
          <option value="div">Division</option>
        </select>

        <label for="grade">Årgang</label>
        <select id="grade">
          <option value="1">1. klasse</option>
          <option value="2">2. klasse</option>
          <option value="3">3. klasse</option>
          <option value="4">4. klasse</option>
          <option value="5">5. klasse</option>
          <option value="6">6. klasse</option>
        </select>

        <label for="start-level">Start level</label>
        <select id="start-level">
          <option value="0">Level 1</option>
          <option value="1">Level 2</option>
          <option value="2">Level 3</option>
        </select>

        <div class="btn-row">
          <button id="btn-start">Start spil</button>
        </div>
      </div>
    </div>

    <div id="math-dialog" style="display:none;">
      <div class="panel">
        <h2>Matematik udfordring</h2>
        <div class="question" id="math-question"></div>
        <input type="number" id="math-answer" />
        <div class="feedback" id="math-feedback"></div>
        <div class="btn-row">
          <button id="btn-submit-answer">Svar</button>
        </div>
      </div>
    </div>

    <div id="game-over-screen" style="display:none;">
      <div class="panel">
        <h1>Game Over</h1>
        <div class="btn-row">
          <button id="btn-restart">Til startskærm</button>
        </div>
      </div>
    </div>

    <div id="level-complete-screen" style="display:none;">
      <div class="panel">
        <h1>Level gennemført!</h1>
        <p id="level-complete-text"></p>
        <div class="btn-row">
          <button id="btn-next-level">Næste level</button>
          <button id="btn-back-menu">Til startskærm</button>
        </div>
      </div>
    </div>
  </div>

<script>
window.onload = () => {

  console.log("✔ Script loaded — alle elementer findes nu");

  /*  
     HELE SPILLET ER HERINDE  
     (Jeg har ikke ændret gameplay, kun sikret korrekt load-rækkefølge)
  */

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const startScreen = document.getElementById('start-screen');
  const mathDialog = document.getElementById('math-dialog');
  const gameOverScreen = document.getElementById('game-over-screen');
  const levelCompleteScreen = document.getElementById('level-complete-screen');

  const btnStart = document.getElementById('btn-start');
  const btnSubmitAnswer = document.getElementById('btn-submit-answer');
  const btnRestart = document.getElementById('btn-restart');
  const btnNextLevel = document.getElementById('btn-next-level');
  const btnBackMenu = document.getElementById('btn-back-menu');

  const topicSelect = document.getElementById('topic');
  const gradeSelect = document.getElementById('grade');
  const startLevelSelect = document.getElementById('start-level');

  const livesEl = document.getElementById('lives');
  const hudInfoEl = document.getElementById('hud-info');
  const hudLevelEl = document.getElementById('hud-level');

  const mathQuestionEl = document.getElementById('math-question');
  const mathAnswerEl = document.getElementById('math-answer');
  const mathFeedbackEl = document.getElementById('math-feedback');
  const levelCompleteTextEl = document.getElementById('level-complete-text');

  const GRAVITY = 0.6;
  const MOVE_SPEED = 4;
  const JUMP_FORCE = -11;
  const MAX_LIVES = 3;

  let keys = {};
  let gameRunning = false;
  let currentTopic = 'add';
  let currentGrade = 1;
  let currentLevelIndex = 0;
  let lives = MAX_LIVES;

  let player;
  let platforms = [];
  let enemies = [];
  let spikes = [];
  let mathPortals = [];

  let pendingMathPortal = null;
  let currentQuestion = null;

  const LEVELS = [
    {
      name: 'Level 1',
      platforms: [
        { x: 0, y: 480, w: 960, h: 60 },
        { x: 150, y: 380, w: 160, h: 20 },
        { x: 380, y: 320, w: 160, h: 20 },
        { x: 620, y: 260, w: 160, h: 20 }
      ],
      enemies: [
        { x: 260, y: 450, w: 32, h: 32, dir: -1, speed: 1.2, range: 80, originX: 260 }
      ],
      spikes: [
        { x: 540, y: 460, w: 40, h: 20 }
      ],
      mathPortals: [
        { x: 650, y: 220, w: 40, h: 40, solved: false }
      ]
    }
  ];

  function createPlayer() {
    return {
      x: 40,
      y: 420,
      w: 32,
      h: 40,
      vx: 0,
      vy: 0,
      onGround: false
    };
  }

  window.addEventListener('keydown', (e) => keys[e.key] = true);
  window.addEventListener('keyup', (e) => keys[e.key] = false);

  function getRangeForGrade(g) {
    return { min: 0, max: g * 10 };
  }

  function generateQuestion(topic, grade) {
    const { min, max } = getRangeForGrade(grade);
    let a = Math.floor(Math.random() * max);
    let b = Math.floor(Math.random() * max);
    let text = '';
    let answer = 0;

    if (topic === 'add') { text = `${a} + ${b}`; answer = a + b; }
    if (topic === 'sub') { text = `${a} - ${b}`; answer = a - b; }
    if (topic === 'mul') { text = `${a} × ${b}`; answer = a * b; }
    if (topic === 'div') { b = b || 1; a = b * Math.floor(Math.random() * 10); text = `${a} ÷ ${b}`; answer = a / b; }

    return { text, answer };
  }

  function openMathDialog(portal) {
    pendingMathPortal = portal;
    currentQuestion = generateQuestion(currentTopic, currentGrade);
    mathQuestionEl.textContent = currentQuestion.text;
    mathAnswerEl.value = '';
    mathFeedbackEl.textContent = '';
    mathDialog.style.display = 'flex';
    gameRunning = false;
  }

  btnSubmitAnswer.addEventListener('click', () => {
    const val = parseInt(mathAnswerEl.value);
    if (val === currentQuestion.answer) {
      pendingMathPortal.solved = true;
      mathDialog.style.display = 'none';
      gameRunning = true;
    } else {
      lives--;
      if (lives <= 0) showGameOver();
      mathDialog.style.display = 'none';
      gameRunning = true;
    }
    updateHUD();
  });

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function loadLevel(i) {
    const L = LEVELS[i];
    currentLevelIndex = i;
    platforms = L.platforms.map(p => ({ ...p }));
    enemies = L.enemies.map(e => ({ ...e }));
    spikes = L.spikes.map(s => ({ ...s }));
    mathPortals = L.mathPortals.map(m => ({ ...m }));
    player = createPlayer();
    updateHUD();
  }

  function updateHUD() {
    livesEl.innerHTML = '';
    for (let i = 0; i < lives; i++) livesEl.innerHTML += '<span></span>';
    hudInfoEl.textContent = `${currentTopic} · ${currentGrade}. kl`;
    hudLevelEl.textContent = LEVELS[currentLevelIndex].name;
  }

  function showGameOver() {
    gameRunning = false;
    gameOverScreen.style.display = 'flex';
  }

  btnRestart.addEventListener('click', () => {
    startScreen.style.display = 'flex';
    gameOverScreen.style.display = 'none';
    lives = MAX_LIVES;
  });

  btnBackMenu.addEventListener('click', () => {
    startScreen.style.display = 'flex';
    levelCompleteScreen.style.display = 'none';
  });

  btnNextLevel.addEventListener('click', () => {
    levelCompleteScreen.style.display = 'none';
    loadLevel(0);
    gameRunning = true;
  });

  function update() {
    if (!gameRunning) return;

    player.vx = 0;
    if (keys['ArrowLeft']) player.vx = -MOVE_SPEED;
    if (keys['ArrowRight']) player.vx = MOVE_SPEED;
    if (keys[' '] && player.onGround) { player.vy = JUMP_FORCE; player.onGround = false; }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;
    for (const p of platforms) {
      if (rectsOverlap(player, p)) {
        if (player.vy > 0) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }

    for (const e of enemies) {
      if (rectsOverlap(player, e)) lives--;
    }

    for (const s of spikes) {
      if (rectsOverlap(player, s)) lives--;
    }

    for (const m of mathPortals) {
      if (!m.solved && rectsOverlap(player, m)) openMathDialog(m);
    }

    if (lives <= 0) showGameOver();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#5bb85b';
    ctx.fillRect(0, 480, 960, 60);

    ctx.fillStyle = '#ffdd55';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    for (const p of platforms) {
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(p.x, p.y, p.w, p.h);
    }

    for (const e of enemies) {
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(e.x, e.y, e.w, e.h);
    }

    for (const s of spikes) {
      ctx.fillStyle = '#ccc';
      ctx.fillRect(s.x, s.y, s.w, s.h);
    }

    for (const m of mathPortals) {
      ctx.strokeStyle = m.solved ? '#4cd964' : '#4ec0ff';
      ctx.strokeRect(m.x, m.y, m.w, m.h);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  btnStart.addEventListener('click', () => {
    console.log("✔ Start-knap trykket");
    currentTopic = topicSelect.value;
    currentGrade = parseInt(gradeSelect.value);
    const startIndex = parseInt(startLevelSelect.value);
    lives = MAX_LIVES;
    loadLevel(startIndex);
    startScreen.style.display = 'none';
    gameRunning = true;
  });

  loadLevel(0);
  loop();

};
</script>

</body>
</html>
