<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Math Platformer</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 20px;
      font-size: 48px;
      font-weight: 800;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    /* STARTSKÆRM */
    #startScreen {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      text-align: center;
      width: 600px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #startScreen select {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.8);
      color: #333;
      font-weight: bold;
    }

    /* LEVEL GRID */
    #levelButtons {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    #levelButtons button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #4da3ff;
      color: white;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #levelButtons button:hover {
      background: #6bb8ff;
      transform: translateY(-3px);
    }

    /* LOCKED LEVELS */
    #levelButtons button.locked {
      background: #555;
      cursor: not-allowed;
      position: relative;
    }

    #levelButtons button.locked::after {
      content: "🔒";
      position: absolute;
      right: 8px;
      top: 6px;
      font-size: 18px;
    }

    /* CANVAS */
    #gameContainer {
      margin-top: 20px;
      display: none;
    }

    canvas {
      background: linear-gradient(#6ec6ff, #4fa3ff, #2a6bd6);
      border: 3px solid white;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    /* HUD */
    #hud {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <h1>Math Platformer</h1>

  <!-- STARTSKÆRM -->
  <div id="startScreen">
    <h2>Vælg indstillinger</h2>

    <label>Emne:</label><br>
    <select id="topicSelect">
      <option value="add">Addition</option>
      <option value="sub">Subtraktion</option>
      <option value="mul">Multiplikation</option>
      <option value="div">Division</option>
    </select>

    <br>

    <label>Klassetrin:</label><br>
    <select id="gradeSelect">
      <option value="1">1. klasse</option>
      <option value="2">2. klasse</option>
      <option value="3">3. klasse</option>
      <option value="4">4. klasse</option>
      <option value="5">5. klasse</option>
    </select>

    <h2>Vælg Level</h2>

    <div id="levelButtons">
      <button data-level="0">1</button>
      <button data-level="1">2</button>
      <button data-level="2">3</button>
      <button data-level="3">4</button>
      <button data-level="4">5</button>
      <button data-level="5">6</button>
      <button data-level="6">7</button>
      <button data-level="7">8</button>
      <button data-level="8">9</button>
      <button data-level="9">10</button>
    </div>
  </div>

  <!-- SPILLET -->
  <div id="gameContainer">
    <canvas id="game" width="800" height="540"></canvas>
  </div>

  <div id="hud">
    <span id="hudLevel">Level: -</span> |
    <span id="hudLives">Liv: 3</span> |
    <span id="hudInfo"></span>
  </div>

  <script>
    /* === UNLOCK SYSTEM === */
    let unlockedLevels = [true, false, false, false, false, false, false, false, false, false];

    const levelButtons = Array.from(document.querySelectorAll("#levelButtons button"));

    function refreshLevelButtons() {
      levelButtons.forEach((btn, idx) => {
        if (unlockedLevels[idx]) {
          btn.classList.remove("locked");
          btn.disabled = false;
        } else {
          btn.classList.add("locked");
          btn.disabled = true;
        }
      });
    }
    refreshLevelButtons();
    /* === INPUT === */
    const keys = { left:false, right:false, up:false };

    window.addEventListener("keydown", e => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
      if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.up = true;
    });

    window.addEventListener("keyup", e => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
      if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
      if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.up = false;
    });

    /* === CANVAS === */
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    /* === GAME STATE === */
    let currentLevelIndex = -1;
    let player = null;
    let cameraX = 0;
    let gravity = 0.6;
    let friction = 0.8;
    let lives = 3;
    let running = false;

    let projectiles = [];
    let enemyProjectiles = [];

    const hudLevel = document.getElementById("hudLevel");
    const hudLives = document.getElementById("hudLives");
    const hudInfo = document.getElementById("hudInfo");

    const startScreen = document.getElementById("startScreen");
    const gameContainer = document.getElementById("gameContainer");
    const hud = document.getElementById("hud");

    /* === PLATFORM GENERATOR (afstand + højde) === */
    const PLATFORM_Y_OFFSET = -40;
    const PLATFORM_GAP = 80;

    function generatePlatforms(list) {
      return list.map((p, i) => ({
        x: p.x,
        y: p.y + PLATFORM_Y_OFFSET - (i * PLATFORM_GAP),
        w: p.w,
        h: p.h
      }));
    }

    /* === PLAYER === */
    function resetPlayer() {
      player = {
        x: 100,
        y: 400,
        w: 32,
        h: 48,
        vx: 0,
        vy: 0,
        onGround: false
      };
      cameraX = 0;
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    function killPlayer() {
      lives--;
      hudLives.textContent = "Liv: " + lives;

      if (lives <= 0) {
        lives = 3;
        hudLives.textContent = "Liv: 3";
        running = false;
        gameContainer.style.display = "none";
        hud.style.display = "none";
        startScreen.style.display = "block";
        return;
      }

      resetPlayer();
    }

    /* === MARIO PIXEL FIGUR (moderne SMW‑stil) === */
    function drawPixelMario(x, y) {
      ctx.save();
      ctx.translate(x, y);

      // Hat
      ctx.fillStyle = "#ff0000";
      ctx.fillRect(8, 0, 24, 10);

      // Face
      ctx.fillStyle = "#ffcc99";
      ctx.fillRect(10, 10, 20, 20);

      // Hair
      ctx.fillStyle = "#8b4513";
      ctx.fillRect(8, 10, 6, 10);

      // Body
      ctx.fillStyle = "#0000ff";
      ctx.fillRect(8, 30, 24, 20);

      // Arms
      ctx.fillStyle = "#ff0000";
      ctx.fillRect(4, 30, 10, 10);
      ctx.fillRect(26, 30, 10, 10);

      // Legs
      ctx.fillStyle = "#8b4513";
      ctx.fillRect(8, 50, 10, 15);
      ctx.fillRect(22, 50, 10, 15);

      ctx.restore();
    }

    /* === PLAYER UPDATE === */
    function updatePlayer(level) {
      const speed = 3;

      if (keys.left) player.vx = -speed;
      else if (keys.right) player.vx = speed;
      else player.vx *= friction;

      if (keys.up && player.onGround) {
        player.vy = -11;
        player.onGround = false;
      }

      player.vy += gravity;

      player.x += player.vx;
      player.y += player.vy;

      player.onGround = false;

      /* PLATFORM COLLISION */
      for (const p of level.platforms) {
        const prevX = player.x - player.vx;
        const prevY = player.y - player.vy;

        const pr = {x: player.x, y: player.y, w: player.w, h: player.h};
        const pl = {x: p.x, y: p.y, w: p.w, h: p.h};

        if (rectsOverlap(pr, pl)) {
          if (prevY + player.h <= p.y) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (prevY >= p.y + p.h) {
            player.y = p.y + p.h;
            player.vy = 0;
          } else if (prevX + player.w <= p.x) {
            player.x = p.x - player.w;
            player.vx = 0;
          } else if (prevX >= p.x + p.w) {
            player.x = p.x + p.w;
            player.vx = 0;
          }
        }
      }

      if (player.y > canvas.height + 200) killPlayer();

      cameraX = player.x - canvas.width / 2;
      if (cameraX < 0) cameraX = 0;
    }

    /* === SHOOTING === */
    window.addEventListener("click", () => {
      if (!running) return;

      const dir = keys.left ? -1 : 1;

      projectiles.push({
        x: player.x + player.w/2,
        y: player.y + player.h/2,
        w: 8,
        h: 8,
        vx: 7 * dir,
        vy: 0
      });
    });

    /* === ENEMY AI === */
    function updateEnemies(level, dt) {
      for (const e of level.enemies) {

        if (e.type === "movingShooter") {
          if (!e.dir) e.dir = 1;
          if (!e.startX) e.startX = e.x;

          e.x += e.speed * e.dir;

          if (e.x > e.startX + e.range) e.dir = -1;
          if (e.x < e.startX - e.range) e.dir = 1;
        }

        if (e.type === "boss") {
          if (!e.dir) e.dir = 1;
          if (!e.startX) e.startX = e.x;

          e.x += e.speed * e.dir;

          if (e.x > e.startX + 200) e.dir = -1;
          if (e.x < e.startX - 200) e.dir = 1;
        }

        let shootInterval = e.shootSpeed || 1500;

        if (e.type === "boss") {
          if (e.hp <= 3 && e.ultraShootSpeed) shootInterval = e.ultraShootSpeed;
          else if (e.hp <= 6 && e.enragedShootSpeed) shootInterval = e.enragedShootSpeed;
        }

        if (e.type === "shooter" || e.type === "movingShooter" || e.type === "boss") {
          if (!e.lastShot) e.lastShot = 0;
          e.lastShot += dt;

          const dx = (player.x + player.w/2) - (e.x + e.w/2);
          const dy = (player.y + player.h/2) - (e.y + e.h/2);
          const dist = Math.hypot(dx, dy);

          const inRange = !e.range || dist < e.range;

          if (e.lastShot > shootInterval && inRange) {
            e.lastShot = 0;

            const speed = 4;
            const vx = (dx / dist) * speed;
            const vy = (dy / dist) * speed;

            enemyProjectiles.push({
              x: e.x + e.w/2,
              y: e.y + e.h/2,
              w: 8,
              h: 8,
              vx,
              vy
            });
          }
        }
      }
    }

    /* === FALLING OBJECTS === */
    function updateFallingObjects(level) {
      for (const f of level.fallingObjects || []) {
        f.y += f.speed;
        if (f.y > canvas.height + 200) {
          f.y = -50;
        }
      }
    }

    /* === PROJECTILES === */
    function updateProjectiles(level) {

      for (const p of projectiles) {
        p.x += p.vx;
        p.y += p.vy;
      }

      projectiles = projectiles.filter(p =>
        p.x > cameraX - 100 &&
        p.x < cameraX + canvas.width + 100 &&
        p.y > -100 &&
        p.y < canvas.height + 100
      );

      for (const p of enemyProjectiles) {
        p.x += p.vx;
        p.y += p.vy;
      }

      enemyProjectiles = enemyProjectiles.filter(p =>
        p.x > cameraX - 100 &&
        p.x < cameraX + canvas.width + 100 &&
        p.y > -100 &&
        p.y < canvas.height + 100
      );

      for (const p of enemyProjectiles) {
        if (rectsOverlap(player, p)) {
          killPlayer();
          return;
        }
      }

      for (const b of projectiles) {
        for (const e of level.enemies) {
          if (rectsOverlap(b, e)) {
            b.dead = true;

            if (e.type === "boss") {
              e.hp--;
              if (e.hp <= 0) e.dead = true;
            } else {
              e.dead = true;
            }
          }
        }
      }

      projectiles = projectiles.filter(b => !b.dead);
      level.enemies = level.enemies.filter(e => !e.dead);
    }

    /* === HAZARDS === */
    function checkHazards(level) {
      for (const s of level.spikes || []) {
        if (rectsOverlap(player, s)) {
          killPlayer();
          return;
        }
      }

      for (const f of level.fallingObjects || []) {
        if (rectsOverlap(player, f)) {
          killPlayer();
          return;
        }
      }
    }

    /* === PORTAL === */
    function checkPortal(level) {
      const portal = level.portals[0];
      if (!portal) return;

      const bossAlive = level.enemies.some(e => e.type === "boss");
      if (bossAlive) return;

      if (rectsOverlap(player, portal)) {
        portal.solved = true;
        unlockNextLevel();
        running = false;

        gameContainer.style.display = "none";
        hud.style.display = "none";
        startScreen.style.display = "block";
      }
    }

    /* === DRAW === */
    function drawLevel(level) {
      ctx.save();
      ctx.translate(-cameraX, 0);

      ctx.fillStyle = "#654321";
      for (const p of level.platforms) ctx.fillRect(p.x, p.y, p.w, p.h);

      ctx.fillStyle = "#ff4444";
      for (const s of level.spikes || []) ctx.fillRect(s.x, s.y, s.w, s.h);

      ctx.fillStyle = "#cccccc";
      for (const f of level.fallingObjects || []) ctx.fillRect(f.x, f.y, f.w, f.h);

      for (const e of level.enemies) {
        if (e.type === "normal") ctx.fillStyle = "#e67e22";
        else if (e.type === "shooter") ctx.fillStyle = "#9b59b6";
        else if (e.type === "movingShooter") ctx.fillStyle = "#f1c40f";
        else if (e.type === "boss") ctx.fillStyle = "#e74c3c";

        ctx.fillRect(e.x, e.y, e.w, e.h);

        if (e.type === "boss") {
          ctx.fillStyle = "black";
          ctx.fillRect(e.x, e.y - 10, e.w, 6);

          ctx.fillStyle = "#2ecc71";
          const ratio = e.hp / 12;
          ctx.fillRect(e.x, e.y - 10, e.w * ratio, 6);
        }
      }

      const portal = level.portals[0];
      if (portal) {
        ctx.fillStyle = portal.solved ? "#2ecc71" : "#3498db";
        ctx.fillRect(portal.x, portal.y, portal.w, portal.h);
      }

      drawPixelMario(player.x, player.y);

      ctx.fillStyle = "yellow";
      for (const p of projectiles) ctx.fillRect(p.x, p.y, p.w, p.h);

      ctx.fillStyle = "red";
      for (const p of enemyProjectiles) ctx.fillRect(p.x, p.y, p.w, p.h);

      ctx.restore();
    }

    /* === LEVELS ARRAY === */
    const LEVELS = [];
    /* ============================================
       LEVELS 1–10
       ============================================ */

    /* === LEVEL 1 — Intro === */
    LEVELS[0] = {
      name: "Level 1 – Intro",
      falling: false,
      platforms: generatePlatforms([
        {x:0, y:480, w:600, h:60},
        {x:650, y:420, w:250, h:20},
        {x:950, y:380, w:250, h:20},
        {x:1250, y:340, w:250, h:20},
        {x:1550, y:300, w:250, h:20},
        {x:1850, y:340, w:250, h:20},
        {x:2150, y:380, w:250, h:20},
        {x:2450, y:360, w:250, h:20},
        {x:2750, y:330, w:250, h:20},
        {x:3050, y:300, w:250, h:20},
        {x:3350, y:340, w:250, h:20},
        {x:3650, y:380, w:250, h:20}
      ]),
      enemies: [],
      spikes: [],
      fallingObjects: [],
      portals: [{x:3900, y:340, w:40, h:40, solved:false}]
    };

    /* === LEVEL 2 === */
    LEVELS[1] = {
      name: "Level 2 – Fjender & Spikes",
      falling: false,
      platforms: generatePlatforms([
        {x:0, y:480, w:600, h:60},
        {x:650, y:420, w:250, h:20},
        {x:950, y:380, w:250, h:20},
        {x:1250, y:340, w:250, h:20},
        {x:1550, y:300, w:250, h:20},
        {x:1850, y:340, w:250, h:20},
        {x:2150, y:380, w:250, h:20},
        {x:2450, y:360, w:250, h:20},
        {x:2750, y:330, w:250, h:20},
        {x:3050, y:300, w:250, h:20},
        {x:3350, y:340, w:250, h:20},
        {x:3650, y:380, w:250, h:20}
      ]),
      enemies: [
        {x:900, y:350, w:40, h:40, type:"normal"},
        {x:2100, y:350, w:40, h:40, type:"normal"}
      ],
      spikes: [
        {x:1400, y:480, w:120, h:40},
        {x:3000, y:480, w:120, h:40}
      ],
      fallingObjects: [],
      portals: [{x:3900, y:340, w:40, h:40, solved:false}]
    };

    /* === LEVEL 3 === */
    LEVELS[2] = {
      name: "Level 3 – Skydefjender",
      falling: false,
      platforms: generatePlatforms([
        {x:0, y:480, w:600, h:60},
        {x:650, y:420, w:250, h:20},
        {x:950, y:380, w:250, h:20},
        {x:1250, y:340, w:250, h:20},
        {x:1550, y:300, w:250, h:20},
        {x:1850, y:340, w:250, h:20},
        {x:2150, y:380, w:250, h:20},
        {x:2450, y:360, w:250, h:20},
        {x:2750, y:330, w:250, h:20},
        {x:3050, y:300, w:250, h:20},
        {x:3350, y:340, w:250, h:20},
        {x:3650, y:380, w:250, h:20}
      ]),
      enemies: [
        {x:1100, y:350, w:40, h:40, type:"shooter", shootSpeed:1500, range:300},
        {x:2300, y:350, w:40, h:40, type:"shooter", shootSpeed:1500, range:300},
        {x:1700, y:350, w:40, h:40, type:"normal"}
      ],
      spikes: [
        {x:1400, y:480, w:120, h:40},
        {x:3000, y:480, w:120, h:40}
      ],
      fallingObjects: [],
      portals: [{x:3900, y:340, w:40, h:40, solved:false}]
    };

    /* === LEVEL 4 === */
    LEVELS[3] = {
      name: "Level 4 – Faldende ting",
      falling: true,
      platforms: generatePlatforms([
        {x:0, y:480, w:600, h:60},
        {x:650, y:420, w:250, h:20},
        {x:950, y:380, w:250, h:20},
        {x:1250, y:340, w:250, h:20},
        {x:1550, y:300, w:250, h:20},
        {x:1850, y:340, w:250, h:20},
        {x:2150, y:380, w:250, h:20},
        {x:2450, y:360, w:250, h:20},
        {x:2750, y:330, w:250, h:20},
        {x:3050, y:300, w:250, h:20},
        {x:3350, y:340, w:250, h:20},
        {x:3650, y:380, w:250, h:20}
      ]),
      enemies: [
        {x:1200, y:350, w:40, h:40, type:"shooter", shootSpeed:1500, range:300},
        {x:2000, y:350, w:40, h:40, type:"normal"},
        {x:2600, y:350, w:40, h:40, type:"normal"}
      ],
      spikes: [
        {x:1400, y:480, w:120, h:40},
        {x:3100, y:480, w:120, h:40}
      ],
      fallingObjects: [
        {x:1700, y:0, w:40, h:40, speed:4},
        {x:2900, y:0, w:40, h:40, speed:5}
      ],
      portals: [{x:3900, y:340, w:40, h:40, solved:false}]
    };

    /* === LEVEL 5 === */
    LEVELS[4] = {
      name: "Level 5 – Moving Shooters",
      falling: false,
      platforms: generatePlatforms([
        {x:0, y:480, w:600, h:60},
        {x:650, y:420, w:250, h:20},
        {x:950, y:380, w:250, h:20},
        {x:1250, y:340, w:250, h:20},
        {x:1550, y:300, w:250, h:20},
        {x:1850, y:340, w:250, h:20},
        {x:2150, y:380, w:250, h:20},
        {x:2450, y:360, w:250, h:20},
        {x:2750, y:330, w:250, h:20},
        {x:3050, y:300, w:250, h:20},
        {x:3350, y:340, w:250, h:20},
        {x:3650, y:380, w:250, h:20}
      ]),
      enemies: [
        {x:1100, y:350, w:40, h:40, type:"movingShooter", range:200, speed:1.5, shootSpeed:1500},
        {x:2000, y:350, w:40, h:40, type:"movingShooter", range:250, speed:1.8, shootSpeed:1400},
        {x:2600, y:350, w:40, h:40, type:"normal"}
      ],
      spikes: [
        {x:1400, y:480, w:150, h:40},
        {x:3100, y:480, w:150, h:40}
      ],
      fallingObjects: [],
      portals: [{x:3900, y:340, w:40, h:40, solved:false}]
    };

    /* === LEVEL 6 === */
    LEVELS[5] = {
