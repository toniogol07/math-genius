<!DOCTYPE html>

  <meta charset="UTF-8">
  <title>Math Platformer – 10 Levels</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #gameContainer {
      position: relative;
      margin-top: 10px;
    }
    canvas {
      background: linear-gradient(#87ceeb, #4fa3ff);
      border: 2px solid #fff;
      display: block;
    }
    #startScreen {
      margin-top: 20px;
      text-align: center;
    }
    #startScreen h1 {
      margin-bottom: 10px;
    }
    #startScreen select {
      margin: 5px;
      padding: 4px;
    }
    #levelButtons {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
    }
    #levelButtons button {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #2ecc71;
      color: #fff;
      font-weight: bold;
    }
    #levelButtons button.locked {
      background: #555;
      cursor: not-allowed;
    }
    #hud {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

      enemyProjectiles = [];

      hudInfo.textContent = LEVELS[index].name;
      running = true;
      startScreen.style.display = "none";
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.level, 10);
        if (!unlockedLevels[idx]) return;
        startLevel(idx);
      });
    });

    function unlockNextLevel() {
      if (currentLevelIndex < LEVELS.length - 1) {
        unlockedLevels[currentLevelIndex + 1] = true;
        refreshLevelButtons();
      }

    function killPlayer() {
      lives--;
      hudLives.textContent = "Liv: " + lives;
      if (lives <= 0) {
        lives = 3;
        hudLives.textContent = "Liv: " + lives;
        startScreen.style.display = "block";
        running = false;
      } else {
        resetPlayer();
      }
    }

    function updatePlayer(dt, level) {
      const speed = 3;
      if (keys.left) player.vx = -speed;
      else if (keys.right) player.vx = speed;
      else player.vx *= friction;

      if (keys.up && player.onGround) {
        player.vy = -11;
        player.onGround = false;
      }

      player.vy += gravity;

      player.x += player.vx;
      player.y += player.vy;

      player.onGround = false;

      // Platform collision
      for (const p of level.platforms) {
        const prevY = player.y - player.vy;
        const prevX = player.x - player.vx;
        const playerRect = {x: player.x, y: player.y, w: player.w, h: player.h};
        const platRect = {x: p.x, y: p.y, w: p.w, h: p.h};

        if (rectsOverlap(playerRect, platRect)) {
          if (prevY + player.h <= p.y) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (prevY >= p.y + p.h) {
            player.y = p.y + p.h;
            player.vy = 0;
          } else if (prevX + player.w <= p.x) {
            player.x = p.x - player.w;
            player.vx = 0;
          } else if (prevX >= p.x + p.w) {
            player.x = p.x + p.w;
            player.vx = 0;
          }
        }
      }

      if (player.y > canvas.height + 200) {
        killPlayer();
      }

      cameraX = player.x - canvas.width / 2;
      if (cameraX < 0) cameraX = 0;
    }

    function updateEnemies(dt, level) {
      for (const e of level.enemies) {
        if (e.type === "movingShooter") {
          if (!e.dir) e.dir = 1;
          if (!e.startX) e.startX = e.x;
          e.x += e.speed * e.dir;
          if (e.x > e.startX + e.range) e.dir = -1;
          if (e.x < e.startX - e.range) e.dir = 1;
        }
        if (e.type === "boss") {
          if (!e.dir) e.dir = 1;
          if (!e.startX) e.startX = e.x;
          e.x += e.speed * e.dir;
          if (e.x > e.startX + 200) e.dir = -1;
          if (e.x < e.startX - 200) e.dir = 1;
        }

        // Shooting
        let shootInterval = e.shootSpeed || 1500;
        if (e.type === "boss") {
          if (e.hp <= 3 && e.ultraShootSpeed) shootInterval = e.ultraShootSpeed;
          else if (e.hp <= 6 && e.enragedShootSpeed) shootInterval = e.enragedShootSpeed;
        }

        if ((e.type === "shooter" || e.type === "movingShooter" || e.type === "boss") && shootInterval) {
          if (!e.lastShot) e.lastShot = 0;
          e.lastShot += dt;
          const dx = (player.x + player.w/2) - (e.x + e.w/2);
          const dy = (player.y + player.h/2) - (e.y + e.h/2);
          const dist = Math.hypot(dx, dy);
          const inRange = !e.range || dist < e.range;
          if (e.lastShot > shootInterval && inRange) {
            e.lastShot = 0;
            const speed = 4;
            const vx = (dx / dist) * speed;
            const vy = (dy / dist) * speed;
            enemyProjectiles.push({
              x: e.x + e.w/2,
              y: e.y + e.h/2,
              w: 8,
              h: 8,
              vx,
              vy
            });
          }
        }
      }
    }

    function updateFallingObjects(dt, level) {
      for (const f of level.fallingObjects || []) {
        f.y += f.speed;
        if (f.y > canvas.height + 200) {
          f.y = -50;
        }
      }
    }

    function updateProjectiles(dt, level) {
      for (const p of projectiles) {
        p.x += p.vx;
        p.y += p.vy;
      }
      projectiles = projectiles.filter(p => p.x > cameraX - 100 && p.x < cameraX + canvas.width + 100 && p.y > -100 && p.y < canvas.height + 100);

      for (const p of enemyProjectiles) {
        p.x += p.vx;
        p.y += p.vy;
      }
      enemyProjectiles = enemyProjectiles.filter(p => p.x > cameraX - 100 && p.x < cameraX + canvas.width + 100 && p.y > -100 && p.y < canvas.height + 100);

      // Player hit by enemy projectile
      for (const p of enemyProjectiles) {
        if (rectsOverlap(player, p)) {
          killPlayer();
          break;
        }
      }

      // Player bullets hit enemies
      const enemies = level.enemies;
      for (const bullet of projectiles) {
        for (const e of enemies) {
          if (rectsOverlap(bullet, e)) {
            bullet.dead = true;
            if (e.type === "boss") {
              e.hp--;
              if (e.hp <= 0) e.dead = true;
            } else {
              e.dead = true;
            }
          }
        }
      }
      projectiles = projectiles.filter(b => !b.dead);
      level.enemies = enemies.filter(e => !e.dead);
    }

    function checkHazards(level) {
      for (const s of level.spikes || []) {
        if (rectsOverlap(player, s)) {
          killPlayer();
          return;
        }
      }
      for (const f of level.fallingObjects || []) {
        if (rectsOverlap(player, f)) {
          killPlayer();
          return;
        }
      }
    }

    function checkPortal(level) {
      const portal = level.portals[0];
      if (!portal) return;
      if (level.enemies.some(e => e.type === "boss")) {
        const bossAlive = level.enemies.some(e => e.type === "boss");
        if (bossAlive) return;
      }
      if (rectsOverlap(player, portal)) {
        portal.solved = true;
        unlockNextLevel();
        running = false;
        startScreen.style.display = "block";
      }
    }

    window.addEventListener("click", e => {
      if (!running) return;
      const dir = keys.left ? -1 : 1;
      projectiles.push({
        x: player.x + player.w/2,
        y: player.y + player.h/2,
        w: 8,
        h: 8,
        vx: 7 * dir,
        vy: 0
      });
    });

    function drawLevel(level) {
      ctx.save();
      ctx.translate(-cameraX, 0);

      // Platforms
      ctx.fillStyle = "#654321";
      for (const p of level.platforms) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      // Spikes
      ctx.fillStyle = "#ff4444";
      for (const s of level.spikes || []) {
        ctx.fillRect(s.x, s.y, s.w, s.h);
      }

      // Falling objects
      ctx.fillStyle = "#cccccc";
      for (const f of level.fallingObjects || []) {
        ctx.fillRect(f.x, f.y, f.w, f.h);
      }

      // Enemies
      for (const e of level.enemies) {
        if (e.type === "normal") ctx.fillStyle = "#e67e22";
        else if (e.type === "shooter") ctx.fillStyle = "#9b59b6";
        else if (e.type === "movingShooter") ctx.fillStyle = "#f1c40f";
        else if (e.type === "boss") ctx.fillStyle = "#e74c3c";
        ctx.fillRect(e.x, e.y, e.w, e.h);
        if (e.type === "boss") {
          ctx.fillStyle = "#000";
          ctx.fillRect(e.x, e.y - 10, e.w, 6);
          ctx.fillStyle = "#2ecc71";
          const ratio = e.hp / (e.maxHp || (e.hp || 1));
          ctx.fillRect(e.x, e.y - 10, e.w * ratio, 6);
        }
      }

      // Portal
      const portal = level.portals[0];
      if (portal) {
        ctx.fillStyle = portal.solved ? "#2ecc71" : "#3498db";
        ctx.fillRect(portal.x, portal.y, portal.w, portal.h);
      }

      // Player
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // Player bullets
      ctx.fillStyle = "#ffff00";
      for (const p of projectiles) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      // Enemy bullets
      ctx.fillStyle = "#ff0000";
      for (const p of enemyProjectiles) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
      }

      ctx.restore();
    }

    function gameLoop(timestamp) {
      if (!running) return;
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      const level = LEVELS[currentLevelIndex];

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      updatePlayer(dt, level);
      updateEnemies(dt, level);
      updateFallingObjects(dt, level);
      updateProjectiles(dt, level);
      checkHazards(level);
      checkPortal(level);

      drawLevel(level);

      requestAnimationFrame(gameLoop);
    }

    // Start i menu
    startScreen.style.display = "block";
  </script>
</body>
</html>
