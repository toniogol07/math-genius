<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Neon Alien Raid – Endless Neon Edition</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #050816 0%, #02030a 60%, #000000 100%);
    font-family: system-ui, sans-serif;
    color: #fff;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #uiLayer {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  #startScreen, #quizScreen, #gameOverScreen {
    pointer-events: auto;
    background: rgba(10,10,30,0.95);
    border-radius: 20px;
    padding: 24px 32px;
    border: 2px solid #00ffff88;
    box-shadow: 0 0 30px #00ffff55;
    text-align: center;
    display: none;
    width: 350px;
  }

  button {
    width: 100%; padding: 10px 0;
    border-radius: 999px; border: none;
    background: linear-gradient(90deg,#00f5ff,#00ff88);
    font-weight: 700; cursor: pointer;
    margin-top: 10px;
  }

  #hudTop {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 16px;
    pointer-events: none;
  }

  #hudTop span {
    padding: 4px 10px; border-radius: 999px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #00ffff55;
  }

  #hudBottomLeft {
    position: absolute; left: 16px; bottom: 12px;
    pointer-events: none;
  }

  #hudBottomLeft .box {
    background: rgba(0,0,0,0.6);
    border: 1px solid #00ffff55;
    padding: 6px 10px;
    border-radius: 10px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="uiLayer">
  <div id="startScreen">
    <h1>NEON ALIEN RAID</h1>
    <p>Endeløst neon‑skydespil med matematik‑quiz.</p>
    <label for="gradeSelect">Klassetrin:</label>
    <select id="gradeSelect">
      <option value="1">1. klasse</option>
      <option value="2">2. klasse</option>
      <option value="3">3. klasse</option>
      <option value="4">4. klasse</option>
      <option value="5" selected>5. klasse</option>
      <option value="6">6. klasse</option>
      <option value="7">7. klasse</option>
      <option value="8">8. klasse</option>
      <option value="9">9. klasse</option>
    </select>
    <button id="startBtn">Start spil</button>
  </div>

  <div id="quizScreen">
    <h2>Matematik‑runde</h2>
    <p>Forkert svar = mister 1 liv</p>
    <div id="questions"></div>
    <button id="submitQuizBtn">Fortsæt</button>
  </div>

  <div id="gameOverScreen">
    <h2>Game Over</h2>
    <p id="gameOverText"></p>
    <button id="restartBtn">Spil igen</button>
  </div>
</div>

<div id="hudTop" style="display:none;">
  <span id="hudGrade">Klasse: -</span>
  <span id="hudLives">Liv: 3</span>
  <span id="hudKills">Kills: 0</span>
  <span id="hudScore">Score: 0</span>
</div>

<div id="hudBottomLeft" style="display:none;">
  <div class="box" id="hudAmmo"><strong>Ammo:</strong> 30 / 30</div>
  <div class="box"><strong>Styring:</strong> A/D = gå, W = hop, SPACE = skyd</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// UI refs
const uiLayer = document.getElementById("uiLayer");
const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const gradeSelect = document.getElementById("gradeSelect");
const startBtn = document.getElementById("startBtn");
const submitQuizBtn = document.getElementById("submitQuizBtn");
const restartBtn = document.getElementById("restartBtn");
const questionsDiv = document.getElementById("questions");
const gameOverText = document.getElementById("gameOverText");

const hudTop = document.getElementById("hudTop");
const hudGrade = document.getElementById("hudGrade");
const hudLives = document.getElementById("hudLives");
const hudKills = document.getElementById("hudKills");
const hudScore = document.getElementById("hudScore");
const hudBottomLeft = document.getElementById("hudBottomLeft");
const hudAmmo = document.getElementById("hudAmmo");

// Input
const keys = { a:false, d:false, w:false, space:false };
addEventListener("keydown", e => {
  if (e.code === "KeyA") keys.a = true;
  if (e.code === "KeyD") keys.d = true;
  if (e.code === "KeyW") keys.w = true;
  if (e.code === "Space") {
    if (!keys.space) shoot();
    keys.space = true;
  }
});
addEventListener("keyup", e => {
  if (e.code === "KeyA") keys.a = false;
  if (e.code === "KeyD") keys.d = false;
  if (e.code === "KeyW") keys.w = false;
  if (e.code === "Space") keys.space = false;
});

// Game state
let running = false;
let inQuiz = false;
let last = 0;

let grade = 5;
let lives = 3;
let kills = 0;
let score = 0;

// ⭐ Neon Player
const player = {
  x: 0, y: 0, w: 32, h: 60,
  vx: 0, vy: 0,
  speed: 260,
  jumpPower: 800,
  onGround: false,
  facing: 1
};

let bullets = [];
let enemies = [];
let enemyBullets = [];
let platforms = [];

let ammo = 30;
let maxAmmo = 30;
let canShoot = true;
let reloading = false;
let spawnTimer = 0;

// Clamp player til banen
function clampPlayer() {
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
}

// ⭐ Neon Platforms + Spawn Platforms
function createPlatforms() {
  const g = canvas.height - 80;
  platforms = [
    { x: 0, y: g, w: canvas.width, h: 40 },
    { x: canvas.width * 0.1, y: g - 160, w: 180, h: 20 },
    { x: canvas.width * 0.4, y: g - 230, w: 200, h: 20 },
    { x: canvas.width * 0.72, y: g - 170, w: 180, h: 20 },

    // ⭐ Spawn-platforme udenfor banen
    { x: -250, y: g - 40, w: 250, h: 20 },
    { x: canvas.width, y: g - 40, w: 250, h: 20 }
  ];
}
// ⭐ Neon Enemy Drawing
function drawEnemies() {
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x + e.w/2, e.y + e.h/2);

    ctx.shadowColor = "#ff00ff";
    ctx.shadowBlur = 20;

    let core = "rgba(255,0,255,1)";
    if (e.type === "runner") core = "rgba(0,255,0,1)";
    if (e.type === "shooter") core = "rgba(0,200,255,1)";
    if (e.type === "tank") core = "rgba(255,120,0,1)";

    const grad = ctx.createRadialGradient(0,0,0,0,0,26);
    grad.addColorStop(0, core);
    grad.addColorStop(1, "rgba(255,0,255,0.1)");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0,0,22,28,0,0,Math.PI*2);
    ctx.fill();

    // HP bar
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(-20, -35, 40, 5);
    ctx.fillStyle = "#00ff88";
    ctx.fillRect(-20, -35, 40 * (e.hp / e.maxHp), 5);

    ctx.restore();
  });
}

// ⭐ Neon Player Drawing
function drawPlayer() {
  ctx.save();
  ctx.translate(player.x + player.w/2, player.y + player.h/2);
  ctx.scale(player.facing, 1);

  ctx.shadowColor = "#00f5ff";
  ctx.shadowBlur = 20;

  // Body
  ctx.fillStyle = "#00ffbb";
  ctx.fillRect(-10, -30, 20, 40);

  // Head
  ctx.fillStyle = "#00f5ff";
  ctx.beginPath();
  ctx.arc(0, -45, 12, 0, Math.PI * 2);
  ctx.fill();

  // AK‑47
  ctx.fillStyle = "#ffaa33";
  ctx.fillRect(5, -25, 32, 6);
  ctx.fillRect(30, -28, 12, 4);

  ctx.restore();
}

// ⭐ Neon Bullets
function drawBullets() {
  ctx.save();
  ctx.shadowBlur = 15;

  // Player bullets
  ctx.shadowColor = "#ffff00";
  ctx.fillStyle = "#ffff66";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, b.w, b.h);
  });

  // Enemy bullets
  ctx.shadowColor = "#ff0066";
  ctx.fillStyle = "#ff3366";
  enemyBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

// ⭐ Neon Platforms
function drawPlatforms() {
  ctx.save();
  ctx.shadowColor = "#00f5ff";
  ctx.shadowBlur = 15;
  ctx.fillStyle = "rgba(0,255,255,0.3)";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
  ctx.restore();
}

// ⭐ Neon Background
function drawBackground() {
  const w = canvas.width;
  const h = canvas.height;

  const grad = ctx.createRadialGradient(
    w/2, h/2, 0,
    w/2, h/2, Math.max(w,h)
  );
  grad.addColorStop(0, "#050816");
  grad.addColorStop(0.5, "#02030a");
  grad.addColorStop(1, "#000000");

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // Neon grid
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = "#0ff";
  ctx.lineWidth = 1;
  const grid = 80;
  for (let x = 0; x < w; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = 0; y < h; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ⭐ DRAW EVERYTHING
function draw() {
  drawBackground();
  drawPlatforms();
  drawEnemies();
  drawBullets();
  drawPlayer();
}

// ⭐ ENEMY UPDATE (with spawn-platform collision)
function updateEnemies(dt) {
  enemies.forEach(e => {
    const dir = player.x > e.x ? 1 : -1;
    const baseSpeed = 40 + grade * 8 + kills * 0.3;
    e.vx = dir * baseSpeed;

    e.x += e.vx * dt;

    // Collision with ALL platforms (including spawn platforms)
    for (const p of platforms) {
      if (e.x < p.x + p.w &&
          e.x + e.w > p.x &&
          e.y < p.y + p.h &&
          e.y + e.h > p.y) {
        e.y = p.y - e.h;
      }
    }

    // Shooting
    e.shootCooldown -= dt;
    if (e.type === "shooter" || e.type === "tank") {
      if (e.shootCooldown <= 0) {
        e.shootCooldown = 1 + Math.random() * 1.5;
        if (Math.random() < 0.25 + grade * 0.05) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          enemyBullets.push({
            x: e.x + e.w/2,
            y: e.y + e.h/2,
            vx: (dx/d) * (200 + grade * 20),
            vy: (dy/d) * (200 + grade * 20),
            r: e.type === "tank" ? 7 : 5,
            life: 0,
            maxLife: 2
          });
        }
      }
    }
  });
}

// ⭐ ENEMY BULLETS UPDATE
function updateEnemyBullets(dt) {
  enemyBullets.forEach(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life += dt;
  });
  enemyBullets = enemyBullets.filter(b => b.life < b.maxLife);
}

// ⭐ COLLISIONS
function handleCollisions() {
  // Player bullets vs enemies
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (b.x < e.x + e.w &&
          b.x + b.w > e.x &&
          b.y < e.y + e.h &&
          b.y + b.h > e.y) {
        b.life = b.maxLife;
        e.hp -= 25 + grade * 3 + kills * 0.4;
        if (e.hp <= 0) {
          e.dead = true;
          kills++;
          score += 10 + grade * 2 + Math.floor(kills * 0.5);
          hudKills.textContent = "Kills: " + kills;
          hudScore.textContent = "Score: " + score;
        }
      }
    });
  });
  enemies = enemies.filter(e => !e.dead);

  // Enemy bullets vs player
  enemyBullets.forEach(b => {
    if (b.x > player.x &&
        b.x < player.x + player.w &&
        b.y > player.y &&
        b.y < player.y + player.h) {
      b.life = b.maxLife;
      loseLife();
    }
  });
}

// ⭐ GAME LOOP
function loop(t) {
  const dt = (t - last) / 1000;
  last = t;

  if (running && !inQuiz) {
    update(dt);
    draw();
  }

  requestAnimationFrame(loop);
}

// ⭐ QUIZ SYSTEM
let currentQuestions = [];

function generateQuestion() {
  let a = Math.floor(Math.random() * 50);
  let b = Math.floor(Math.random() * 50);
  let op = ["+","-","*"][Math.floor(Math.random() * 3)];
  let ans = op === "+" ? a + b : op === "-" ? a - b : a * b;
  return { text: `${a} ${op} ${b} = ?`, answer: ans };
}

function startQuiz() {
  inQuiz = true;
  running = false;
  questionsDiv.innerHTML = "";
  currentQuestions = [];

  for (let i = 0; i < 3; i++) {
    const q = generateQuestion();
    currentQuestions.push(q);
    questionsDiv.innerHTML += `
      <div>${i+1}. ${q.text}</div>
      <input type="number" data-i="${i}">
    `;
  }

  quizScreen.style.display = "block";
  uiLayer.style.display = "flex";
}

submitQuizBtn.onclick = () => {
  let wrong = 0;
  const inputs = questionsDiv.querySelectorAll("input");
  inputs.forEach(inp => {
    const i = Number(inp.dataset.i);
    if (Number(inp.value) !== currentQuestions[i].answer) wrong++;
  });

  lives -= wrong;
  hudLives.textContent = "Liv: " + lives;

  if (lives <= 0) { gameOver(); return; }

  quizScreen.style.display = "none";
  uiLayer.style.display = "none";
  inQuiz = false;
  running = true;
};

// ⭐ START / RESTART / GAME OVER
startBtn.onclick = () => {
  grade = Number(gradeSelect.value);
  hudGrade.textContent = "Klasse: " + grade;
  hudTop.style.display = "flex";
  hudBottomLeft.style.display = "block";
  startScreen.style.display = "none";
  uiLayer.style.display = "none";
  resetGame();
  running = true;
};

restartBtn.onclick = () => {
  gameOverScreen.style.display = "none";
  startScreen.style.display = "block";
  uiLayer.style.display = "flex";
};

function gameOver() {
  running = false;
  inQuiz = false;
  gameOverText.textContent = `Du fik ${kills} kills og score ${score}.`;
  gameOverScreen.style.display = "block";
  uiLayer.style.display = "flex";
}

// ⭐ INIT
startScreen.style.display = "block";
uiLayer.style.display = "flex";
requestAnimationFrame(loop);

</script>
</body>
</html>
